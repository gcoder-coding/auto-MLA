<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoMLA - Document Generator</title>
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            margin-top: 0;
            color: var(--primary);
            font-size: 1.8rem;
            text-align: center;
        }

        p {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 0.85rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AutoMLA 📝</h1>
    <p>Enter your details to generate a pre-formatted MLA document.</p>
    
    <form id="mlaForm">
        <div class="form-group">
            <label for="studentName">Your Name</label>
            <input type="text" id="studentName" placeholder="e.g. Jane Doe" required>
        </div>
        
        <div class="form-group">
            <label for="teacherName">Teacher's Name</label>
            <input type="text" id="teacherName" placeholder="e.g. Mr. Smith" required>
        </div>
        
        <div class="form-group">
            <label for="className">Class / Course</label>
            <input type="text" id="className" placeholder="e.g. English 101" required>
        </div>

        <button type="submit">Generate Document</button>
    </form>
</div>

<script>
    document.getElementById('mlaForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // Get values from form
        const student = document.getElementById('studentName').value;
        const teacher = document.getElementById('teacherName').value;
        const className = document.getElementById('className').value;

        // Format today's date to MLA style (e.g., 13 July 2026)
        const today = new Date();
        const day = today.getDate();
        const month = today.toLocaleString('default', { month: 'long' });
        const year = today.getFullYear();
        const mlaDate = `${day} ${month} ${year}`;

        // Create HTML content with exact MLA styling (Times New Roman, 12pt, Double Spaced)
        const docContent = `
            <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
            <head>
                <title>MLA Document</title>
                <style>
                    body {
                        font-family: "Times New Roman", Times, serif;
                        font-size: 12pt;
                        line-height: 2.0; /* Double spacing */
                        margin: 1in; /* 1 inch margins */
                    }
                    p {
                        margin: 0;
                        padding: 0;
                    }
                </style>
            </head>
            <body>
                <p>${student}</p>
                <p>${teacher}</p>
                <p>${className}</p>
                <p>${mlaDate}</p>
                <p>&nbsp;</p> <p style="text-align: center;">Title of Your Essay</p>
                <p style="text-indent: 0.5in;">Start typing your essay here...</p>
            </body>
            </html>
        `;

        // Create a blob and trigger download as a .doc file
        const blob = new Blob(['\ufeff' + docContent], {
            type: 'application/msword'
        });
        
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${className.replace(/\s+/g, '_')}_Essay.doc`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });
</script>

</body>
</html>
